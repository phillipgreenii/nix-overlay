name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  nix-checks:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Determinate Nix
        uses: DeterminateSystems/determinate-nix-action@v3
        with:
          extra-conf: |
            accept-flake-config = true

      - name: Setup Nix store cache
        if: runner.os == 'Linux'
        uses: nix-community/cache-nix-action@v7
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('**/flake.lock') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-

      - name: Check Nix flake inputs
        uses: DeterminateSystems/flake-checker-action@3164002371bc90729c68af0e24d5aacf20d7c9f6 # v12
        with:
          ignore-missing-flake-lock: false
          fail-mode: true
          send-statistics: false

      # --all-systems evaluates the outputs for every system in the flake's
      # `systems` list, not just the runner's. The runner still only BUILDS its
      # own system's derivations (foreign systems are eval-only), but this
      # surfaces eval errors on x86_64-darwin and aarch64-linux — which are
      # declared yet have no dedicated CI leg — instead of shipping silently
      # (pg2-g3p6r).
      - name: Run nix flake check
        run: nix flake check --all-systems --show-trace -L
