name: Update Flake Dependencies

# Thin caller of the reusable workflow hosted in the public phillipg-nix-repo-base
# (bead pg2-wwpy9). The schedule stays local; everything else is centralized.

on:
  schedule:
    # Run nightly at 11:00 AM UTC (6:00 AM EST)
    - cron: "0 11 * * *"
  workflow_dispatch: # Allow manual trigger

concurrency:
  group: update-flakes
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  update-flakes:
    uses: phillipgreenii/nix-repo-base/.github/workflows/update-flakes-reusable.yml@main
    secrets: inherit
    with:
      automerge: rebase
