[cmux]
src.github = "manaflow-ai/cmux"
src.prefix = "v"
fetch.url = "https://github.com/manaflow-ai/cmux/releases/download/v$ver/cmux-macos.dmg"

# Eclipse EPP "Eclipse IDE for Java Developers" macOS .dmg. Pinned to a fixed
# quarterly release with nvchecker's `manual` source (`src.manual`), so the
# nightly updater never auto-bumps it — Eclipse releases are quarterly and each
# bump is a deliberate, reviewed change. The download URL is a static literal
# (the path embeds the release train `2026-06/R`, which does not map cleanly to
# a `$ver` substitution). aarch64-darwin only.
[eclipse-java]
src.manual = "2026-06-R"
fetch.url = "https://download.eclipse.org/technology/epp/downloads/release/2026-06/R/eclipse-java-2026-06-R-macosx-cocoa-aarch64.dmg"

# NOTE: no `src.prefix = "v"`. nvfetcher's `fetch.github` fetches rev `$ver`
# verbatim, and pint's release tags are `vX.Y.Z`; stripping the prefix would
# make it fetch rev `0.87.0` (no such tag -> 404). Keeping the `v` in the
# version yields the correct `fetchFromGitHub` rev; packages/pint strips it
# for the ldflag.
[pint]
src.github = "cloudflare/pint"
fetch.github = "cloudflare/pint"

# Same pattern as pint: glowm's release tags are `vX.Y.Z`; keep the `v`
# (no `src.prefix`) so `fetch.github` fetches the correct rev, and let
# packages/glowm strip it for the version/ldflag.
[glowm]
src.github = "atani/glowm"
fetch.github = "atani/glowm"

[tmux-open-nvim]
src.git = "https://github.com/trevarj/tmux-open-nvim"
src.branch = "master"
fetch.github = "trevarj/tmux-open-nvim"

[tmux-mouse-swipe]
src.git = "https://github.com/jaclu/tmux-mouse-swipe"
src.branch = "main"
fetch.github = "jaclu/tmux-mouse-swipe"

[tmux-nerd-font-window-name]
src.git = "https://github.com/joshmedeski/tmux-nerd-font-window-name"
src.branch = "main"
fetch.github = "joshmedeski/tmux-nerd-font-window-name"

[bat-gherkin-syntax]
src.git = "https://github.com/keith-hall/SublimeGherkinSyntax"
src.branch = "master"
fetch.github = "keith-hall/SublimeGherkinSyntax"

# Yazi plugins: tracked here so the nightly updater bumps them (previously
# hand-pinned fetchFromGitHub in packages/yaziPlugins/*, which the updater
# never touched — pg2-ztb6l).
[bunny]
src.git = "https://github.com/stelcodes/bunny.yazi"
src.branch = "main"
fetch.github = "stelcodes/bunny.yazi"

[icons-brew]
src.git = "https://github.com/lpnh/icons-brew.yazi"
src.branch = "main"
fetch.github = "lpnh/icons-brew.yazi"
